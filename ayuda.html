<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Ayuda - Cuaderno de Recetas</title>
  <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32.png?v=1784326908037">
<link rel="apple-touch-icon" href="assets/apple-touch-icon.png?v=1784326908037">

  <style>
    :root{--ink:#3a210f;--muted:#746456;--green:#4F9B68;--terracotta:#d36b43;--line:#eadcc7;--card:#fffdf8;--shadow:#3b210f14}
    *{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;padding:28px;background:radial-gradient(circle at 8% 0,#fff1d6 0 20%,transparent 42%),linear-gradient(135deg,#fff9ef,#f7ecdc);color:var(--ink);font-family:Segoe UI,system-ui,sans-serif}
    main{max-width:760px;width:100%;text-align:center;background:var(--card);border:1px solid var(--line);border-radius:28px;padding:34px;box-shadow:0 18px 54px var(--shadow)}
    .logo{display:block;width:min(520px,86vw);height:auto;margin:0 auto 24px;border-radius:16px}.brand{font-weight:900;letter-spacing:.18em;color:var(--green)}
    .eyebrow{margin:0 0 10px;color:var(--terracotta);font-size:12px;font-weight:900;letter-spacing:.16em}h1{font:700 clamp(34px,7vw,56px)/1 Georgia,serif;margin:0 0 14px}p{color:var(--muted);font-size:18px;line-height:1.65}.planned{display:grid;gap:10px;margin:24px auto 0;padding:0;max-width:520px;text-align:left;list-style:none}.planned li{padding:12px 14px;border:1px solid var(--line);border-radius:16px;background:#fffaf1;color:var(--ink);font-weight:750}.planned li:before{content:'✓';color:var(--green);font-weight:900;margin-right:10px}.actions{display:flex;justify-content:center;gap:10px;flex-wrap:wrap;margin-top:24px}a{display:inline-flex;align-items:center;justify-content:center;min-height:40px;padding:10px 18px;border-radius:999px;background:var(--green);color:#fff;text-decoration:none;font-weight:850}.secondary{background:#f7ead7;color:var(--green);border:1px solid #c7c99f}
  </style>
</head>
<body>
  <main>
    <img class="logo" src="assets/logo-header.png?v=1784326908037" alt="Tu propio cuaderno de Recetas">
    <p class="eyebrow">SECCIÓN EN PREPARACIÓN</p>
    <h1>Ayuda</h1>
    <p>Ac&#225; vamos a explicar c&#243;mo buscar, guardar, compartir e imprimir recetas de forma simple.</p>
    
    <div class="actions"><a href="index.html">Volver a recetas</a><a class="secondary" href="ayuda.html">Ver ayuda</a></div>
  </main>
</body>
</html>
