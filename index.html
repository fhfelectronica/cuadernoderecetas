<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Cuaderno de Recetas</title>
  <style>
    :root{--ink:#2e241c;--muted:#75685d;--green:#4F9B68;--sage:#ddeed8;--terracotta:#c86b45;--pale:#f4eadb;--paper:#fff8ec;--card:#fffdf8;--line:#e7dccb;--shadow:#3a261512}
    *{box-sizing:border-box} body{margin:0;background:radial-gradient(circle at 8% 0,#fff0cf 0 20%,transparent 42%),linear-gradient(135deg,#fff8ec,#f7efe3);color:var(--ink);font-family:Segoe UI,system-ui,sans-serif;font-size:16px}
    header{padding:72px 6vw 54px;background:linear-gradient(135deg,#f5dfbf,#e6eed8 58%,#fff8ec);border-bottom:1px solid var(--line);position:relative;overflow:hidden}
    header:after{content:"";position:absolute;right:-90px;top:-110px;width:330px;height:330px;border-radius:50%;background:#ffffff45;box-shadow:-70px 120px 0 #ffffff26}
    .brand{position:relative;font:800 13px/1 Segoe UI,sans-serif;letter-spacing:.22em;color:var(--green)}
    h1{position:relative;font:700 clamp(38px,7vw,64px)/.98 Georgia,serif;margin:18px 0 16px;max-width:900px;color:var(--ink)}
    header p{position:relative;max-width:700px;color:var(--muted);font-size:18px;line-height:1.7}.toolbar{max-width:1180px;margin:-28px auto 34px;padding:0 24px;position:relative;z-index:2}
    .search{display:flex;align-items:center;background:var(--card);border:1px solid var(--line);border-radius:999px;box-shadow:0 16px 44px var(--shadow);padding:9px 18px}
    .search input{width:100%;border:0;outline:0;padding:12px;font-size:17px;color:var(--ink)}.count{white-space:nowrap;color:var(--muted);font-size:14px}
    main{max-width:1180px;margin:auto;padding:0 24px 70px}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(310px,1fr));gap:24px}
    .card{overflow:hidden;background:var(--card);border:1px solid var(--line);border-radius:26px;box-shadow:0 10px 30px var(--shadow);transition:.2s}.clickable-card{cursor:pointer}.clickable-card:focus{outline:3px solid #c8dcbf;outline-offset:4px}
    .card:hover{transform:translateY(-4px);box-shadow:0 18px 44px #3a26151f}.image{height:230px;background:#eadfce;overflow:hidden}.image img{width:100%;height:100%;object-fit:cover;transition:transform .35s ease}.card:hover .image img{transform:scale(1.035)}
    .placeholder{display:grid;place-items:center;background:linear-gradient(135deg,#d9ead2,#f5dfbf)}.placeholder span{font:700 74px Georgia;color:var(--green)}
    .content{padding:24px 24px 26px}.eyebrow{margin:0 0 8px;color:var(--terracotta);font-size:11px;font-weight:900;letter-spacing:.16em}.content h2{font:700 30px/1.08 Georgia,serif;margin:0 0 12px;color:var(--ink)}
    .author{margin:-4px 0 12px;color:var(--green);font-size:14px;font-weight:800}.summary{color:var(--muted);line-height:1.58;white-space:pre-line}details{border-top:1px solid var(--line);margin-top:20px;padding-top:16px}summary{cursor:pointer;font-weight:800;color:var(--green)}
    .print-button{display:inline-block;appearance:none;border:1px solid #b9c6a5;background:#f5eadb;color:var(--green);border-radius:999px;padding:10px 15px;font:800 13px Segoe UI,sans-serif;cursor:pointer;margin-top:10px;text-decoration:none}.print-button:hover{background:#efe0ce}
    dl{margin:18px 0 0}.detail{padding:12px 0;border-top:1px dashed var(--line)}dt{font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:var(--muted)}dd{margin:7px 0 0;line-height:1.6;white-space:pre-line}a{color:#287345}
    .ad-placeholder{display:grid;place-items:center;min-height:92px;border:1px dashed #b9a88f;border-radius:20px;background:linear-gradient(135deg,#fffdf8,#f6ead8);color:#8a7765;font-size:13px;font-weight:700;letter-spacing:.08em;text-align:center;text-transform:uppercase}
    .toolbar+.ad-placeholder{max-width:1180px;margin:-14px auto 34px}.grid>.ad-placeholder{min-height:100%;padding:24px}
    .empty{text-align:center;padding:80px 20px;background:#fffdf8;border:1px dashed #b9a88f;border-radius:28px}.empty span{font-size:52px}.empty h2{font:700 34px Georgia;margin:12px}.empty p{color:var(--muted)}
    .hidden{display:none}@media(max-width:600px){header{padding-top:42px}.grid{grid-template-columns:1fr}.count{display:none}}
    @page{size:A4 portrait;margin:10mm}
    @media print{
      html,body{width:190mm;min-height:277mm;background:#fff;color:#111;font-size:10.5pt}
      body.printing header,body.printing .toolbar,body.printing .empty,body.printing .ad-placeholder{display:none!important}
      body.printing main{max-width:none;margin:0;padding:0}
      body.printing .grid{display:block}
      body.printing .card{display:none}
      body.printing .card.print-selected{display:block;border:0;border-radius:0;box-shadow:none;transform:none;overflow:visible;zoom:var(--print-scale,1)}
      body.printing .card.print-selected .image{float:left;width:58mm;height:52mm;border-radius:4mm;margin:0 7mm 5mm 0}
      body.printing .card.print-selected .content{padding:0}
      body.printing .card.print-selected h2{font-size:24pt;margin-bottom:3mm}
      body.printing .card.print-selected .summary{margin:0 0 3mm;line-height:1.35}
      body.printing .card.print-selected details{clear:both;margin-top:5mm;padding-top:3mm}
      body.printing .card.print-selected details>summary{display:none}
      body.printing .card.print-selected details>dl{display:grid;grid-template-columns:1fr 1fr;gap:0 8mm;margin:0}
      body.printing .card.print-selected .detail{break-inside:avoid;padding:2.2mm 0}
      body.printing .card.print-selected dt{font-size:8.5pt}
      body.printing .card.print-selected dd{font-size:10pt;line-height:1.35}
      body.printing .print-button{display:none!important}
      body.printing a{color:#111;text-decoration:none}
    }
  </style>
</head>
<body>
  <header><div class="brand">Tu propio cuaderno de Recetas</div><h1>Cuaderno de Recetas</h1><p>Elige, crea, y colecciona tus recetas preferidas.</p></header>
  <div class="toolbar"><label class="search">🔎<input id="search" type="search" placeholder="Buscar recetas, ingredientes o ideas…" autofocus><span class="count" id="count">1 publicaciones</span></label></div>
  <aside class="ad-placeholder" aria-label="Publicidad superior">
  <span>Espacio reservado para publicidad</span>
</aside>
  <main><section class="grid" id="recipes"><article class="card clickable-card" data-search="R00001 Budin   fer      5 - huevos
500 gr - azucar  azucar y manteca

huevos

hornear  False" tabindex="0" role="link" onclick="window.open('receta-6.html','_blank','noopener')" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();window.open('receta-6.html','_blank','noopener');}">
  <div class="image"><img src="media/receta-6.jpg" alt="Budin"></div>
  <div class="content">
    <p class="eyebrow">RECETA &#183; PUBLICACI&#211;N</p>
    <h2>Budin</h2>
    <p class="author">Por fer</p>
    <p class="summary">Una nueva publicaci&#243;n del recetario.</p>
    <span class="print-button">Ver receta</span>
  </div>
</article></section></main>
  <script>
    const input=document.querySelector('#search'),cards=[...document.querySelectorAll('.card')],counter=document.querySelector('#count');
    input.addEventListener('input',()=>{const q=input.value.toLocaleLowerCase('es').trim();let shown=0;cards.forEach(card=>{const visible=!q||card.dataset.search.toLocaleLowerCase('es').includes(q);card.classList.toggle('hidden',!visible);if(visible)shown++});counter.textContent=`${shown} publicaciones`});
    function openRecipeWindow(url){const opened=window.open(url,'_blank','popup=yes,width=980,height=900,scrollbars=yes,resizable=yes');if(opened){opened.focus();return false}return true}
    let printedDetails=null;
    function printRecipe(button){
      const card=button.closest('.card'),details=card.querySelector('details');
      printedDetails=details&&!details.open?details:null;
      if(details)details.open=true;
      card.classList.add('print-selected');document.body.classList.add('printing');
      card.style.setProperty('--print-scale','1');
      requestAnimationFrame(()=>{const printableHeight=1040,height=card.scrollHeight;const scale=Math.max(.55,Math.min(1,printableHeight/Math.max(height,1)));card.style.setProperty('--print-scale',scale.toFixed(3));requestAnimationFrame(()=>window.print())});
    }
    addEventListener('afterprint',()=>{document.body.classList.remove('printing');document.querySelector('.print-selected')?.classList.remove('print-selected');if(printedDetails)printedDetails.open=false;printedDetails=null});
  </script>
</body>
</html>
