<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Mi cuenta - Cuaderno de Recetas</title>
  <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32.png?v=1784207867630">
<link rel="apple-touch-icon" href="assets/apple-touch-icon.png?v=1784207867630">
<meta property="og:image" content="assets/logo-icon-512.png?v=1784207867630">

  <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
  <style>
    :root{--ink:#3a210f;--muted:#746456;--green:#4F9B68;--terracotta:#d36b43;--line:#eadcc7;--card:#fffdf8;--shadow:#3b210f14}
    *{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 8% 0,#fff1d6 0 20%,transparent 42%),linear-gradient(135deg,#fff9ef,#f7ecdc);color:var(--ink);font-family:Segoe UI,system-ui,sans-serif;font-size:16px}
    header{padding:34px 20px 16px;text-align:center}.logo{display:block;width:min(520px,88vw);height:auto;margin:0 auto 18px;border-radius:16px;box-shadow:0 10px 28px #3b210f10}.brand{font-weight:900;letter-spacing:.18em;color:var(--green)}
    main{max-width:1040px;margin:0 auto 64px;padding:0 20px}.panel{background:var(--card);border:1px solid var(--line);border-radius:28px;padding:28px;box-shadow:0 18px 54px var(--shadow)}
    .eyebrow{margin:0 0 10px;color:var(--terracotta);font-size:12px;font-weight:900;letter-spacing:.16em;text-transform:uppercase}h1{font:700 clamp(34px,7vw,56px)/1 Georgia,serif;margin:0 0 12px}.lead{color:var(--muted);line-height:1.65;margin:0 0 22px;max-width:760px}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:18px}.card{background:#fffaf1;border:1px solid var(--line);border-radius:22px;padding:20px}.card h2{font:700 24px/1.15 Georgia,serif;margin:0 0 10px}.card ul{margin:12px 0 0;padding-left:20px;color:var(--muted);line-height:1.65}.login{display:grid;gap:12px;max-width:560px;margin:18px 0}.login label{display:grid;gap:6px;font-weight:800}.login input{border:1px solid var(--line);border-radius:16px;background:white;color:var(--ink);font:inherit;padding:12px 14px}.actions{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-top:4px}button,a.button{border:0;border-radius:999px;background:var(--green);color:white;padding:12px 20px;font-weight:900;font:inherit;cursor:pointer;text-decoration:none}button:disabled{opacity:.55;cursor:not-allowed}.secondary{background:#f7ead7!important;color:var(--green)!important;border:1px solid #c7c99f!important}.notice{padding:12px 14px;border:1px dashed #c9a38b;border-radius:16px;background:#fff7ea;color:#7a5136;line-height:1.5}.status{color:var(--muted);font-size:14px}.success{color:#2f6b3f;font-weight:800}.error{color:#a83232;font-weight:800}.hidden{display:none}.account-panel{margin-top:18px}
    @media(max-width:760px){.grid{grid-template-columns:1fr}.panel{padding:22px}}
  </style>
</head>
<body>
  <header><img class="logo" src="assets/logo-header.png?v=1784207867630" alt="Tu propio cuaderno de Recetas"></header>
  <main>
    <section class="panel">
      <p class="eyebrow">Mi cuenta</p>
      <h1>Mi cuenta</h1>
      <p class="lead">Escribí tu email y te enviamos un enlace para entrar. No necesitás recordar una contraseña.</p>
      <form class="login" id="loginForm">
        <label>Email <input name="email" type="email" maxlength="120" autocomplete="email" placeholder="tu@email.com" required></label>
        <div class="cf-turnstile" data-sitekey="0x4AAAAAAD1x8qPysBE8VunM"></div>
        <div class="actions">
          <button type="submit" >Enviar enlace de acceso</button>
          <a class="button secondary" href="index.html">Volver a recetas</a>
          <span class="status" id="loginStatus">Revisá tu correo después de pedir el enlace.</span>
        </div>
      </form>
      <section class="account-panel hidden" id="accountPanel">
        <p class="eyebrow">Sesión activa</p>
        <h2 id="accountTitle">Mi panel</h2>
        <p id="accountText" class="lead"></p>
        <button id="logoutButton" type="button">Cerrar sesión</button>
      </section>
    </section>
  </main>
  <script>
    const endpoint="https://api.cuadernoderecetas.com.ar/";
    const form=document.querySelector('#loginForm'),status=document.querySelector('#loginStatus'),accountPanel=document.querySelector('#accountPanel'),accountTitle=document.querySelector('#accountTitle'),accountText=document.querySelector('#accountText'),logoutButton=document.querySelector('#logoutButton');
    const params=new URLSearchParams(location.search);
    if(params.get('login')==='ok'){status.textContent='Ingreso correcto.';status.className='status success'}
    if(params.get('login')==='expired'){status.textContent='El enlace venció o ya fue usado. Pedí uno nuevo.';status.className='status error'}
    if(params.get('login')==='blocked'){status.textContent='La cuenta está suspendida o bloqueada.';status.className='status error'}
    checkSession();
    form.addEventListener('submit',async event=>{
      event.preventDefault();
      if(!endpoint){status.textContent='Falta configurar el endpoint seguro.';status.className='status error';return}
      const data=Object.fromEntries(new FormData(form).entries());
      status.textContent='Enviando enlace...';status.className='status';
      try{
        const response=await fetch(endpoint.replace(/\/$/,'')+'/auth/request-link',{method:'POST',credentials:'include',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});
        if(!response.ok) throw new Error('No se pudo enviar.');
        if(window.turnstile) turnstile.reset();
        form.reset();
        status.textContent='Listo. Revisá tu email para entrar.';
        status.className='status success';
      }catch(error){
        status.textContent='No se pudo enviar el enlace. Probá de nuevo más tarde.';
        status.className='status error';
      }
    });
    logoutButton.addEventListener('click',async()=>{await fetch(endpoint.replace(/\/$/,'')+'/auth/logout',{method:'POST',credentials:'include'});location.href='mi-cuenta.html'});
    async function checkSession(){
      if(!endpoint)return;
      try{
        const response=await fetch(endpoint.replace(/\/$/,'')+'/auth/me',{credentials:'include'});
        const data=await response.json();
        if(!data.authenticated)return;
        form.classList.add('hidden');
        accountPanel.classList.remove('hidden');
        const user=data.user;
        accountTitle.textContent=user.role==='administrador'?'Panel de administración':'Panel personal';
        accountText.textContent=`Ingresaste como ${user.display_name||user.email}.`;
      }catch{}
    }
  </script>
</body>
</html>
